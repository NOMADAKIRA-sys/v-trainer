<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動詞変形 V-Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .card { min-height: 280px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; cursor: pointer; user-select: none; transition: transform 0.1s; line-height: 1.2; }
        .card:active { transform: scale(0.98); }
        rt { font-size: 0.4em; color: #64748b; }
        #verb-list::-webkit-scrollbar { width: 8px; }
        #verb-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <div id="home-screen" class="container mx-auto p-4 max-w-2xl">
        <h1 class="text-3xl font-black text-center mb-2 text-blue-700">V-Trainer</h1>
        <p class="text-center text-gray-500 mb-8 text-sm">動詞変形練習</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-3 flex items-center gap-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-sm">1</span> 元の形</h2>
                <select id="source-select" onchange="init()" class="w-full p-3 border rounded-xl bg-blue-50 outline-none font-bold text-blue-800 focus:ring-2 focus:ring-blue-300">
                    <option value="masu">ます形</option>
                    <option value="jisho">辞書形</option>
                </select>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-3 flex items-center gap-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-sm">2</span> 練習する形</h2>
                <select id="target-select" class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-300">
                    <option value="masu">ます形</option>
                    <option value="jisho" selected>辞書形</option>
                    <option value="nai">ない形</option>
                    <option value="te">て形</option>
                    <option value="ta">た形</option>
                    <option value="kanou">可能形</option>
                    <option value="ikou">意向形</option>
                    <option value="meirei">命令形</option>
                    <option value="kinshi">禁止形</option>
                    <option value="ba">ば形（条件形）</option>
                    <option value="ukemi">受身形</option>
                    <option value="shieki">使役形</option>
                </select>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <h2 class="font-bold mb-3 flex items-center gap-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-sm">3</span> 表示順</h2>
            <div class="flex gap-6 p-1">
                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="order" value="seq" checked class="w-4 h-4 text-blue-600"> 五十音順</label>
                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="order" value="rand" class="w-4 h-4 text-blue-600"> ランダム</label>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold flex items-center gap-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-sm">4</span> 動詞を選択</h2>
                <div class="flex gap-3 text-xs">
                    <button onclick="toggleAll(true)" class="text-blue-500 font-medium">全選択</button>
                    <button onclick="toggleAll(false)" class="text-gray-400 font-medium">解除</button>
                </div>
            </div>
            <div id="verb-list" class="grid grid-cols-2 gap-2 h-72 overflow-y-auto p-1 text-sm">
                </div>
        </div>

        <button onclick="startPractice()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xl font-bold shadow-blue-200 shadow-lg hover:bg-blue-700 transition-all active:transform active:scale-95">練習を始める</button>
    </div>

    <div id="practice-screen" class="hidden container mx-auto p-4 flex flex-col items-center justify-center min-h-screen">
        <div id="progress" class="text-blue-600 font-bold mb-6 bg-blue-50 px-4 py-1 rounded-full">1 / 10</div>
        
        <div id="flash-card" onclick="handleInteraction()" class="bg-white w-full max-w-xl rounded-3xl shadow-xl card flex-col p-8 border-4 border-white ring-1 ring-gray-100 text-center">
            <div id="display-text" class="font-bold tracking-tighter"></div>
            <div id="hint-text" class="text-base text-gray-400 mt-8 font-normal"></div>
        </div>

        <div class="mt-12 flex gap-4 w-full max-w-xl text-sm">
            <button onclick="exitPractice()" class="flex-1 py-4 bg-white text-gray-500 font-bold rounded-2xl border border-gray-200 hover:bg-gray-50">Homeに戻る</button>
        </div>
    </div>

    <div id="result-screen" class="hidden container mx-auto p-4 flex flex-col items-center justify-center min-h-screen text-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-2xl font-black mb-2">練習終了！</h2>
            <button onclick="startPractice()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xl font-bold mb-4 shadow-lg shadow-blue-100">もう一度練習する</button>
            <button onclick="exitPractice()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold">設定に戻る</button>
        </div>
    </div>

            const listEl = document.getElementById('verb-list');
            const currentSource = document.getElementById('source-select').value;
            
            const getReading = (html) => {
                const temp = document.createElement('div');
                temp.innerHTML = html;
                let reading = "";
                const ruby = temp.querySelector('ruby');
                if (ruby) {
                    ruby.childNodes.forEach(node => {
                        if (node.nodeName === 'RT') reading += node.textContent;
                    });
                    reading += html.split('</ruby>')[1] || "";
                } else {
                    reading = temp.textContent;
                }
                return reading;
            };

            // 選択されたSourceの読み仮名でソート
            verbs.sort((a, b) => {
                return getReading(a[currentSource]).localeCompare(getReading(b[currentSource]), 'ja');
            });
            
            listEl.innerHTML = "";
            verbs.forEach((v, index) => {
                const div = document.createElement('label');
                div.className = "flex items-center gap-2 p-2 bg-white border border-gray-100 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors";
                div.innerHTML = `<input type="checkbox" value="${index}" class="verb-checkbox w-4 h-4 rounded text-blue-600"> <span class="truncate">${v[currentSource]}</span>`;
                listEl.appendChild(div);
            });
        }

        function toggleAll(checked) {
            document.querySelectorAll('.verb-checkbox').forEach(cb => cb.checked = checked);
        }

        function startPractice() {
            const checkedBoxes = document.querySelectorAll('.verb-checkbox:checked');
            if (checkedBoxes.length === 0) return alert("練習する動詞をチェックしてください。");

            // インデックスではなく、ソート済みのverbsからデータをコピー
            selectedVerbs = Array.from(checkedBoxes).map(cb => verbs[cb.value]);
            
            if (document.querySelector('input[name="order"][value="rand"]').checked) {
                selectedVerbs.sort(() => Math.random() - 0.5);
            }

            sourceForm = document.getElementById('source-select').value;
            targetForm = document.getElementById('target-select').value;
            targetFormName = document.getElementById('target-select').selectedOptions[0].text;
            
            currentIndex = 0;
            isShowingAnswer = false;
            
            showScreen('practice-screen');
            updateCard();
        }

        function updateCard() {
            const v = selectedVerbs[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${selectedVerbs.length}`;
            
            const displayEl = document.getElementById('display-text');
            const hintEl = document.getElementById('hint-text');

            if (isShowingAnswer) {
                displayEl.innerHTML = v[targetForm];
                displayEl.className = "font-bold text-red-600 scale-105 transition-transform duration-200";
                hintEl.innerText = (currentIndex < selectedVerbs.length - 1) ? "タップして次へ" : "タップして結果へ";
            } else {
                displayEl.innerHTML = v[sourceForm];
                displayEl.className = "font-bold text-slate-800";
                hintEl.innerHTML = `タップして【<span class="text-blue-600 font-bold">${targetFormName}</span>】を表示`;
            }
        }

        function handleInteraction() {
            if (!isShowingAnswer) {
                isShowingAnswer = true;
                updateCard();
            } else {
                if (currentIndex < selectedVerbs.length - 1) {
                    currentIndex++;
                    isShowingAnswer = false;
                    updateCard();
                } else {
                    showScreen('result-screen');
                }
            }
        }

        function showScreen(id) {
            ['home-screen', 'practice-screen', 'result-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function exitPractice() {
            showScreen('home-screen');
        }

        window.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('practice-screen').classList.contains('hidden')) {
                e.preventDefault();
                handleInteraction();
            }
        });

        init();
    </script>
</body>
</html>
